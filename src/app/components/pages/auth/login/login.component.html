<div class="auth-container">
  <div class="auth-card">

    <!-- Header -->
    <div class="auth-header">
      <h1>INICIAR SESIÓN</h1>
      <p>Accede a tu cuenta de League Explorer</p>
    </div>

    <!-- Form -->
    <form (ngSubmit)="onLogin()" class="auth-form">

      <div class="form-group">
        <label>Correo Electrónico</label>
        <input 
          type="email" 
          [(ngModel)]="email" 
          name="email"
          placeholder="tu@email.com" 
          required>
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input 
          type="password" 
          [(ngModel)]="password" 
          name="password"
          placeholder="••••••••" 
          required>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button 
        type="submit" 
        class="btn-primary"
        [disabled]="loading">
        <span *ngIf="!loading">INICIAR SESIÓN</span>
        <span *ngIf="loading">VERIFICANDO...</span>
      </button>

    </form>

    <!-- Links -->
    <div class="auth-footer">
      <p>¿No tienes cuenta?</p>
      <button class="btn-link" (click)="goToRegister()">Crear cuenta</button>
    </div>

    <div class="demo-info">
      <small>Demo: Usa cualquier cuenta registrada previamente o crea una nueva</small>
    </div>

  </div>
</div>
